<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — AutoScan AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-page">
  <div class="hero-glow"></div>
  <div class="hero-glow2"></div>

  <!-- NAVBAR -->
  <nav>
    <a class="nav-logo" href="/"><span>AUTO</span>SCAN AI</a>
    <ul class="nav-links">
      <li><a href="/">Home</a></li>
      <li><a href="/login" class="nav-cta">Login</a></li>
    </ul>
  </nav>

  <div class="auth-center">
    <div class="auth-card">
      <h2>Create Account</h2>
      <p class="subtitle">Join thousands of professionals using AutoScan AI</p>
      
      {% if error %}
      <div class="auth-error">{{ error }}</div>
      {% endif %}
      
      <form method="POST" action="/signup">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" name="name" required placeholder="John Doe" autocomplete="name">
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" name="email" required placeholder="name@company.com" autocomplete="email">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" required placeholder="••••••••" autocomplete="new-password">
        </div>
        <button type="submit" class="btn-primary">⚡ Sign Up</button>
      </form>
      
      <div class="auth-footer">
        Already have an account? <a href="/login">Log in here</a>
      </div>
    </div>
  </div>
</body>
</html>
